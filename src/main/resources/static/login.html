
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Surprise</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/heart.css">

    <link rel="stylesheet" href="css/animation.css">
    

</head>

<body>

<div class="container">

<!-- Heart rIN -->
<div class="hearts"></div>

    <!-- LEFT SIDE -->
    <div class="left-card">

        <h1 class="typing-text">
            Happy Birthday Bestie 💖
        </h1>

        <p class="p">
            A Beautiful Surprise Waiting For You ✨
        </p>

        <img src="images/image1.png" class="fade-border">

    </div>
    

    <!-- RIGHT SIDE -->
    <div class="right-login glass-card fade-in">

        <h2>
            Open Your Surprise 🎁
        </h2>

        <!-- NAME INPUT -->
        <div class="input-box">

            <input type="text" id="name"
                   required placeholder="Enter your name" >

            

        </div>

        
	<div class="pattern-lock">

    	<input type="text" id="passcode"
           	placeholder="Your DOB - 01012000">


</div>
        

        <button onclick="openSurprise()">

            Login 💖

        </button>

    </div>

</div>




<script src="js/script.js"></script>

<script src="js/heart.js"></script>


</body>
</html>
